services:
  - type: web
    name: girlfriend-timetable-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npx prisma db push --schema apps/api/prisma/schema.prisma && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        value: https://time-table-web.vercel.app
      - key: NODE_ENV
        value: production
